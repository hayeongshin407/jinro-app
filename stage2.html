<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나침이와 진로 탐험 — 2단계 직업 탐색</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Gmarket+Sans:wght@500;700&display=swap');

:root {
  --bg: #1a1a2e;
  --card: #0f3460;
  --purple: #7F77DD;
  --purple-dark: #3C3489;
  --teal: #1D9E75;
  --teal-dark: #085041;
  --amber: #e2a04a;
  --text: #f0f0f0;
  --text-sub: #a0a8c0;
  --text-hint: #606880;
  --border: rgba(255,255,255,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --r: 16px;
  --r-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.15) 0%, transparent 100%),
    linear-gradient(180deg, #1a1a2e 0%, #0d1b3e 100%);
}

.header {
  background: rgba(15,52,96,0.95);
  border-bottom: 1px solid var(--border);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(8px);
}
.logo {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--amber);
}
.logo em { color: var(--purple); font-style: normal; }
.stage-pill {
  margin-left: auto;
  background: rgba(29,158,117,0.2);
  border: 1px solid rgba(29,158,117,0.4);
  color: #5dd4a8;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: 'Gmarket Sans', sans-serif;
}

/* ── 메인 화면 ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
  padding: 16px 14px 100px;
  gap: 14px;
  justify-content: center;
}

/* 나침이 대화 행 */
.dialog-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.char-icon {
  width: 200px;
  height: 220px;
  flex-shrink: 0;
  transition: all .4s ease;
}
.char-icon img { width: 100%; height: 100%; object-fit: contain; }

.dialog-bubble {
  background: rgba(15,52,96,0.9);
  border: 1.5px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 16px 18px;
  flex: 1;
  position: relative;
  backdrop-filter: blur(4px);
  animation: fadeUp .35s ease;
}
.dialog-bubble::before {
  content: '';
  position: absolute;
  left: -9px; bottom: 18px;
  border: 7px solid transparent;
  border-right-color: var(--border);
  border-left: none;
}
.dialog-bubble::after {
  content: '';
  position: absolute;
  left: -7px; bottom: 19px;
  border: 6px solid transparent;
  border-right-color: rgba(15,52,96,0.9);
  border-left: none;
}
.bubble-main {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  line-height: 1.65;
  word-break: keep-all;
}
.bubble-sub {
  font-size: 13px;
  color: var(--text-sub);
  line-height: 1.6;
  margin-top: 8px;
  word-break: keep-all;
}

/* 1단계 결과 요약 칩 */
.result-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 12px;
}
.type-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid;
}

/* ── 직업 카드 그리드 ── */
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-hint);
  letter-spacing: .5px;
  padding-left: 2px;
}
.job-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.job-card {
  background: rgba(15,52,96,0.7);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  text-align: left;
  backdrop-filter: blur(4px);
  animation: fadeUp .35s ease;
}
.job-card:hover {
  border-color: var(--amber);
  background: rgba(226,160,74,0.1);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(226,160,74,0.15);
}
.job-card.selected {
  border-color: var(--amber);
  background: rgba(226,160,74,0.12);
  box-shadow: 0 0 0 2px rgba(226,160,74,0.3);
}
.job-card-emoji { font-size: 28px; display: block; margin-bottom: 10px; }
.job-card-name {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--amber);
  display: block;
  margin-bottom: 5px;
}
.job-card-desc {
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.5;
}
.job-card-type {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
}

/* ── 직업 상세 화면 ── */
.job-detail {
  display: none;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp .4s ease;
}
.detail-header {
  background: rgba(15,52,96,0.7);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  text-align: center;
}
.detail-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
.detail-name {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--amber);
  margin-bottom: 6px;
}
.detail-type-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.detail-card {
  background: rgba(15,52,96,0.7);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  backdrop-filter: blur(4px);
}
.detail-card-title {
  font-family: 'Gmarket Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--amber);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-card-body {
  font-size: 14px;
  color: var(--text);
  line-height: 1.8;
  word-break: keep-all;
}
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 6px;
}
.detail-tag {
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--text-sub);
}

/* 로딩 */
.loading-card {
  background: rgba(15,52,96,0.7);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 40px 20px;
  text-align: center;
}
.dots { display: inline-flex; gap: 6px; margin-bottom: 14px; }
.dots span {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--amber);
  animation: bounce 1.1s infinite;
}
.dots span:nth-child(2) { animation-delay: .18s; }
.dots span:nth-child(3) { animation-delay: .36s; }
.loading-text { font-size: 14px; color: var(--text-sub); line-height: 1.8; }

/* 버튼들 */
.btn-row {
  display: flex;
  gap: 10px;
}
.btn-back {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px;
  font-size: 14px;
  font-family: 'Gmarket Sans', sans-serif;
  font-weight: 700;
  color: var(--text-sub);
  cursor: pointer;
  transition: all .18s;
}
.btn-back:hover { border-color: var(--purple); color: var(--purple); }

.footer-btn {
  display: none;
  padding: 14px 16px;
  background: rgba(15,52,96,0.95);
  border-top: 1px solid var(--border);
  position: fixed;
  bottom: 0; left: 0; right: 0;
  backdrop-filter: blur(8px);
}
.btn-next-stage {
  max-width: 560px;
  margin: 0 auto;
  display: block;
  width: 100%;
  background: var(--teal);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 16px;
  font-size: 16px;
  font-family: 'Gmarket Sans', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.btn-next-stage:hover { filter: brightness(1.1); transform: translateY(-1px); }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

@media(max-width:480px) {
  .job-cards { grid-template-columns: 1fr; }
  .char-icon { width: 130px; height: 145px; }
}
</style>
</head>

let step1Data = null;
let selectedJob = null;
let jobList = [];

// ── 초기화 ────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('jinro_step1');
  if (!saved) {
    document.getElementById('bubbleMain').textContent = '앗! 1단계를 먼저 해야 해! 🗺️';
    document.getElementById('bubbleSub').textContent = '1단계로 돌아가서 Holland 검사를 완료해줘.';
    return;
  }
  step1Data = JSON.parse(saved);
  initStage2();
};

function initStage2() {
  const { name, topTypes, scores } = step1Data;
  const top1 = TYPES[topTypes[0]];
  const top2 = topTypes[1] ? TYPES[topTypes[1]] : null;

  // 나침이 멘트
  document.getElementById('bubbleMain').textContent =
    `${name}, 1단계 수고했어! 🎉`;
  document.getElementById('bubbleSub').textContent =
    `너의 주요 흥미 유형이야. 이 유형에 어울리는 직업들을 찾아볼게!`;

  // 결과 유형 칩
  const summary = document.getElementById('resultSummary');
  topTypes.slice(0, 3).forEach(t => {
    const span = document.createElement('span');
    span.className = 'type-chip';
    span.style.background = TYPES[t].bg;
    span.style.color = TYPES[t].color;
    span.style.borderColor = TYPES[t].color + '40';
    span.textContent = `${TYPES[t].emoji} ${TYPES[t].name}`;
    summary.appendChild(span);
  });

  // 직업 목록 구성 (상위 2개 유형 기반, 중복 제거)
  const seen = new Set();
  jobList = [];
  topTypes.slice(0, 2).forEach(t => {
    JOB_DB[t].forEach(job => {
      if (!seen.has(job.name)) {
        seen.add(job.name);
        jobList.push({ ...job, primaryType: t });
      }
    });
  });
  // 최대 8개
  jobList = jobList.slice(0, 8);

  setTimeout(() => renderJobCards(), 800);
}

function renderJobCards() {
  const listArea = document.getElementById('jobListArea');
  listArea.style.display = 'flex';
  const grid = document.getElementById('jobCards');
  grid.innerHTML = '';

  jobList.forEach((job, idx) => {
    const t = TYPES[job.primaryType];
    const card = document.createElement('div');
    card.className = 'job-card';
    card.style.animationDelay = (idx * 0.06) + 's';
    card.innerHTML = `
      <span class="job-card-emoji">${job.emoji}</span>
      <span class="job-card-name">${job.name}</span>
      <span class="job-card-desc">${job.desc}</span>
      <span class="job-card-type" style="background:${t.bg};color:${t.color}">${t.emoji} ${t.name}</span>
    `;
    card.onclick = () => selectJob(job);
    grid.appendChild(card);
  });

  // 나침이 멘트 변경
  document.getElementById('bubbleMain').textContent = '어떤 직업이 궁금해? 🔍';
  document.getElementById('bubbleSub').textContent = '관심 있는 직업을 눌러봐!';
  document.getElementById('resultSummary').style.display = 'none';
}

async function callClaude(messages, system) {
  const res = await fetch(WORKER_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ system, messages, max_tokens:800 }),
  });
  const json = await res.json();
  return json.content?.[0]?.text || '';
}
